<!DOCTYPE html>
<html>
<head>

<title>Edit Blog</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h2>Edit Blog</h2>

<form method="POST">

<input
type="text"
name="title"
value="{{ post[1] }}"
required>

<textarea
name="content"
rows="10"
required>{{ post[2] }}</textarea>

<button>

Update

</button>

</form>

</div>

</body>
</html>
