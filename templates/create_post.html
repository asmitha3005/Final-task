<!DOCTYPE html>
<html>
<head>
<title>Create Blog</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<body>

<div class="container">

<h2>Create New Blog</h2>

<form action="/create" method="POST">

<button>

Publish

</button>

</form>

</div>

</body>
</html>
